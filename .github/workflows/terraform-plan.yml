name: Terraform Plan + Rego Policy Check

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ADM_BUCKET_NAME: ${{ vars.ADM_BUCKET_NAME }}

  TF_VAR_allowed_public_ip_cidr: ${{ vars.ALLOWED_PUBLIC_IP_CIDR }}
  TF_VAR_ssh_public_key: ${{ vars.SSH_PUB_KEY }}
  TF_VAR_adm_bucket_name: ${{ vars.ADM_BUCKET_NAME }}
  TF_VAR_github_repository: ${{ github.repository }}
  TF_VAR_ansible_role_arn: ${{ vars.ARN_OIDC_ANSIBLE_ROLE }}
  TF_VAR_prowler_role_arn: ${{ vars.ARN_OIDC_PROWLER_ROLE }}
  

jobs:
  prepare:
    name: Prepare variables
    runs-on: ubuntu-latest

    outputs:
      github_user: ${{ steps.vars.outputs.github_user }}
      app_bucket_name: ${{ steps.vars.outputs.app_bucket_name }}
      adm_bucket_name: ${{ steps.vars.outputs.adm_bucket_name }}

    steps:
      - name: Build shared variables
        id: vars
        run: |
          GITHUB_USER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          echo "github_user=$GITHUB_USER" >> $GITHUB_OUTPUT
          echo "app_bucket_name=cloudsec-${GITHUB_USER}-app" >> $GITHUB_OUTPUT
          echo "adm_bucket_name=cloudsec-${GITHUB_USER}-adm" >> $GITHUB_OUTPUT

          echo "GitHub user: $GITHUB_USER"
          echo "App bucket: cloudsec-${GITHUB_USER}-app"
          echo "Adm bucket: cloudsec-${GITHUB_USER}-adm"

  plan:
    name: Validate Terraform and Rego policies
    runs-on: ubuntu-latest
    needs: prepare

    env:
      TF_VAR_app_bucket_name: ${{ needs.prepare.outputs.app_bucket_name }}
      TF_VAR_adm_bucket_name: ${{ needs.prepare.outputs.adm_bucket_name }}
      TF_VAR_allowed_public_ip_cidr: ${{ vars.ALLOWED_PUBLIC_IP_CIDR }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_ansible_role_arn: ${{ vars.ARN_OIDC_ANSIBLE_ROLE }}
      TF_VAR_prowler_role_arn: ${{ vars.ARN_OIDC_PROWLER_ROLE }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ARN_OIDC_TERRAFORM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Terraform fmt
        run: terraform fmt -recursive

      - name: Terraform init
        run: terraform init -input=false -reconfigure -backend-config="bucket=${{ vars.TERRAFORM_BUCKET_NAME }}" -backend-config="key=cloudsec/terraform.tfstate" -backend-config="region=${{ vars.AWS_REGION }}" -backend-config="encrypt=true"

      - name: Terraform validate
        run: terraform validate

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1
        with:
          working_directory: infra
          soft_fail: false

      - name: Terraform plan
        run: terraform plan -out=tfplan.binary

      - name: Convert plan to JSON
        run: terraform show -json tfplan.binary > tfplan.json

      - name: Run Rego security policies
        run: |
          opa eval \
            --fail-defined \
            --format pretty \
            --data ../policy/terraform_security.rego \
            --input tfplan.json \
            'data.terraform.security.deny[_]'